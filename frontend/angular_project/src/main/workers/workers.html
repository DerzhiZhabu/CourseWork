<div class="page-content">
  <div class="page-header">
    <div class="page-loader" *ngIf="loading">
      <tui-loader [inheritColor]="true">Загрузка сотрудников...</tui-loader>
    </div>
  </div>

  <tui-error *ngIf="error" [error]="error"></tui-error>

  <table
    *ngIf="data.length; else emptyWorkers"
    tuiTable
    class="table"
    [columns]="columns"
    size="l"
  >
    <thead>
    <tr tuiThGroup>
      <th tuiTh>Фамилия</th>
      <th tuiTh>Имя</th>
      <th tuiTh>Отчество</th>
      <th tuiTh>Статус</th>
      <th tuiTh class="action-head"></th>
    </tr>
    </thead>
    <tbody tuiTbody [data]="data">
    <tr *ngFor="let item of data" tuiTr>
      <td *tuiCell="'surname'" tuiTd>{{ item.surname }}</td>
      <td *tuiCell="'name'" tuiTd>{{ item.name }}</td>
      <td *tuiCell="'patronimic'" tuiTd>{{ item.patronimic }}</td>
      <td *tuiCell="'sost'" tuiTd>{{ item.status ? 'Активен' : 'Уволен' }}</td>
      <td *tuiCell="'edit_button'" tuiTd class="action-cell">
        <button
          appearance="flat"
          iconStart="@tui.info"
          tuiButton
          tuiButtonVertical
          type="button"
          size="l"
          (click)="onOpenMoreWorker(item)"
        >
        </button>
      </td>
    </tr>
    </tbody>
  </table>

<ng-template #emptyWorkers>
  <div class="empty-state-wrap">
    <p class="empty-state">Здесь пока пусто, добавьте своего первого работника</p>
  </div>
</ng-template>

<button
  tuiButton
  class="floating-add-button"
  type="button"
  (click)="showNewWorker()"
>
  Добавить работника
  </button>

  <app-more_workers
    *ngIf="selectedWorker"
    [openMoreWorkers]="openMoreWorkers"
    [workerInfo]="selectedWorker"
    (updated)="onWorkerUpdated($event)"
    (closed)="onCloseMoreWorker()"
  ></app-more_workers>

  <app-new_worker
    [openNewWorker]="openNewWorker"
    (closed)="onCloseNewWorker()"
  ></app-new_worker>
</div>

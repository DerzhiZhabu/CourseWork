<div class="page-content">
  <div class="page-header">
    <div class="page-loader" *ngIf="loading">
      <tui-loader [inheritColor]="true">Загрузка заказов...</tui-loader>
    </div>
  </div>

  <tui-error *ngIf="error" [error]="error"></tui-error>

  <table
    *ngIf="data.length; else emptyOrders"
    tuiTable
    class="table"
    [columns]="columns"
    size="l"
  >
    <thead>
    <tr tuiThGroup>
      <th tuiTh>Номер</th>
      <th tuiTh>Название</th>
      <th tuiTh>Клиент</th>
      <th tuiTh>Дата создания</th>
      <th tuiTh>Статус</th>
      <th tuiTh>Телефон</th>
      <th tuiTh>Тип</th>
      <th tuiTh>Цена</th>
      <th tuiTh class="action-head"></th>
    </tr>
    </thead>
    <tbody tuiTbody [data]="data">
    <tr *ngFor="let item of data" tuiTr>
      <td *tuiCell="'number'" tuiTd>{{ item.number }}</td>
      <td *tuiCell="'name'" tuiTd>{{ item.name }}</td>
      <td *tuiCell="'client'" tuiTd>{{ item.client }}</td>
      <td *tuiCell="'date'" tuiTd>{{ item.date | date:'dd.MM.yyyy' }}</td>
      <td *tuiCell="'sost'" tuiTd>
        <span class="status-cell">
          <span class="status-dot" [ngClass]="getStatusClass(item.sost)"></span>
          <span>{{ item.sost }}</span>
        </span>
      </td>
      <td *tuiCell="'phone'" tuiTd>{{ item.phone }}</td>
      <td *tuiCell="'type'" tuiTd>{{ item.type }}</td>
      <td *tuiCell="'price'" tuiTd>{{ item.price | number:'1.2-2' }} ₽</td>
      <td *tuiCell="'button'" tuiTd class="action-cell">
        <button
          appearance="flat"
          iconStart="@tui.pencil-line"
          tuiButton
          tuiButtonVertical
          type="button"
          size="l"
          (click)="moreOrder(item)"
        >
        </button>
      </td>
    </tr>
    </tbody>
  </table>

  <tui-table-pagination
    *ngIf="data.length"
    class="table-pagination"
    [items]="paginationItems"
    [total]="totalOrders"
    [page]="page"
    [size]="pageSize"
    (paginationChange)="onPaginationChange($event)"
  />

<ng-template #emptyOrders>
  <div class="empty-state-wrap">
    <p class="empty-state">Здесь пока пусто, добавьте свой первый заказ</p>
  </div>
</ng-template>

<button
  tuiButton
  class="floating-add-button"
  (click)="showNewOrder()"
>
  Создать новый заказ
</button>

  <app-new_order
    [openNewOrder]="OpenNewOrder"
    (closed)="onNewOrderClosed()"
  ></app-new_order>

  <app-more_orders
    [openMoreOrders]="OpenMoreOrder"
    [orderInfo]="toSendData"
    (closed)="onMoreOrderClosed()"
  ></app-more_orders>
</div>

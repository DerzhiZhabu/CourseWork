services:
  postgres:
    image: postgres:15.13-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      TZ: ${TZ:-Asia/Novosibirsk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - myapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      args:
        TESTER_UID: ${TESTER_UID:-100001}
        TESTER_GID: ${TESTER_GID:-100001}
    restart: always
    environment:
      TZ: ${TZ:-Asia/Novosibirsk}
      ENV_FILE: /app/.env
      APP_CONFIG_PATH: ${APP_CONFIG_PATH:-/app/config/app-config.json}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-mydb}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-key-for-coursework-32-bytes-min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-key-for-coursework-32-bytes-min}
    ports:
      - "${BACKEND_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
      - ./.env:/app/.env:ro
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myapp_network

  frontend:
    build:
      context: ./frontend/angular_project
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - myapp_network

networks:
  myapp_network:
    driver: bridge

volumes:
  postgres_data:
